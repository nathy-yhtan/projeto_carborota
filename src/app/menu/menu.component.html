<header class="menu">
  <div class="container menu-inner">
    <a routerLink="/" class="logo">
      <span class="logo-icon">🌿</span>
      <span>CarboRota</span>
    </a>

    <button class="menu-btn" type="button" (click)="abrirFecharMenu()">☰</button>

    <nav class="nav-desktop">
      <a routerLink="/" routerLinkActive="ativo" [routerLinkActiveOptions]="{ exact: true }">Início</a>

      <a *ngIf="usuario.logado" routerLink="/calcular" routerLinkActive="ativo">Calcular</a>
      <a *ngIf="usuario.logado" routerLink="/contato" routerLinkActive="ativo">Contato</a>

      <button *ngIf="usuario.logado" type="button" class="btn btn-primario" (click)="sair()">Sair</button>
      <a *ngIf="!usuario.logado" routerLink="/login" class="btn btn-primario">Entrar</a>
    </nav>
  </div>

  <nav class="nav-mobile" *ngIf="menuAberto">
    <a routerLink="/" routerLinkActive="ativo" [routerLinkActiveOptions]="{ exact: true }" (click)="fecharMenu()">Início</a>
    <a *ngIf="usuario.logado" routerLink="/calcular" routerLinkActive="ativo" (click)="fecharMenu()">Calcular</a>
    <a *ngIf="usuario.logado" routerLink="/contato" routerLinkActive="ativo" (click)="fecharMenu()">Contato</a>

    <button *ngIf="usuario.logado" type="button" class="btn btn-primario btn-largura-total" (click)="sair()">Sair</button>
    <a *ngIf="!usuario.logado" routerLink="/login" class="btn btn-primario btn-largura-total" (click)="fecharMenu()">Entrar</a>
  </nav>
</header>
