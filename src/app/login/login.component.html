<div class="login-pagina">
  <div class="card login-card">
    <h1>CarboRota</h1>
    <p>{{ cadastro ? 'Criar conta' : 'Entrar na conta' }}</p>

    <div class="abas">
      <button type="button" [class.ativo]="!cadastro" (click)="cadastro = false">Entrar</button>
      <button type="button" [class.ativo]="cadastro" (click)="cadastro = true">Cadastrar</button>
    </div>

    <form (ngSubmit)="entrar()">
      <div class="form-grupo">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" [(ngModel)]="email" required />
      </div>

      <div class="form-grupo">
        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" [(ngModel)]="senha" required />
      </div>

      <div class="form-grupo" *ngIf="cadastro">
        <label for="confirmar">Confirmar senha</label>
        <input id="confirmar" name="confirmar" type="password" [(ngModel)]="confirmarSenha" required />
      </div>

      <label class="lgpd" *ngIf="cadastro">
        <input type="checkbox" [(ngModel)]="aceiteLgpd" name="lgpd" />
        Aceito a <a routerLink="/lgpd">Política de Privacidade</a>
      </label>

      <button type="submit" class="btn btn-primario btn-largura-total" [disabled]="cadastro && !aceiteLgpd">
        {{ cadastro ? 'Criar conta' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
